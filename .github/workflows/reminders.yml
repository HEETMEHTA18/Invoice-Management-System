name: Daily Invoice Reminders

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 4 * * *' # Run at 4:00 AM UTC (9:30 AM IST) daily
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Reminders via API
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'invonotify.vercel.aoo' }}
          REMINDER_CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          NORMALIZED_SITE_URL="${SITE_URL%/}"
          if [[ ! "${NORMALIZED_SITE_URL}" =~ ^https?:// ]]; then
            NORMALIZED_SITE_URL="https://${NORMALIZED_SITE_URL}"
          fi

          API_URL="${NORMALIZED_SITE_URL}/api/reminders/auto"
          echo "Triggering reminders at ${API_URL} ..."

          CURL_ARGS=(
            -s
            -o /tmp/reminder_response.json
            -w "%{http_code}"
            --max-time 60
            -X POST "${API_URL}"
            -H "Content-Type: application/json"
          )

          if [ -n "${REMINDER_CRON_SECRET}" ]; then
            CURL_ARGS+=(
              -H "Authorization: Bearer ${REMINDER_CRON_SECRET}"
              -H "x-cron-secret: ${REMINDER_CRON_SECRET}"
            )
          fi

          set +e
          HTTP_STATUS=$(curl "${CURL_ARGS[@]}")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::curl failed with exit code ${CURL_EXIT}. Check SITE_URL formatting and API reachability."
            exit 1
          fi

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response body:"
          cat /tmp/reminder_response.json || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Reminder API returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Reminders triggered successfully."

      - name: Notify on failure
        if: failure()
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'invonotify.vercel.aoo' }}
        run: |
          TARGET_URL="${SITE_URL%/}/api/reminders/auto"
          echo "::error::Daily reminder job failed. Check the API logs at ${TARGET_URL}"
