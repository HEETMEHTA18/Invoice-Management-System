name: Daily Invoice Reminders

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '30 13 * * *' # Run at 1:30 PM UTC (7:00 PM IST) daily
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Trigger Reminders via API
        env:
          SITE_URL: ${{ secrets.SITE_URL || vars.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET || secrets.REMINDER_CRON_SECRET || vars.REMINDER_CRON_SECRET }}
        run: |
          if [ -z "${SITE_URL}" ]; then
            echo "::error::Missing SITE_URL. Configure SITE_URL as a GitHub secret/variable."
            exit 1
          fi

          NORMALIZED_SITE_URL="${SITE_URL%/}"
          if [[ ! "${NORMALIZED_SITE_URL}" =~ ^https?:// ]]; then
            NORMALIZED_SITE_URL="https://${NORMALIZED_SITE_URL}"
          fi

          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Missing cron secret. Configure CRON_SECRET as a GitHub secret/variable and set the same value in Vercel env (CRON_SECRET)."
            exit 1
          fi

          API_URL="${NORMALIZED_SITE_URL}/api/reminders/auto"
          echo "Triggering reminders at ${API_URL} ..."

          CURL_ARGS=(
            -s
            -o /tmp/reminder_response.json
            -w "%{http_code}"
            --max-time 60
            -X POST "${API_URL}"
            -H "Content-Type: application/json"
          )

          CURL_ARGS+=(
            -H "Authorization: Bearer ${CRON_SECRET}"
            -H "x-cron-secret: ${CRON_SECRET}"
          )

          set +e
          HTTP_STATUS=$(curl "${CURL_ARGS[@]}")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::curl failed with exit code ${CURL_EXIT}. Check SITE_URL formatting and API reachability."
            exit 1
          fi

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response body:"
          cat /tmp/reminder_response.json || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Reminder API returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Reminders triggered successfully."

      - name: Notify on failure
        if: failure()
        env:
          SITE_URL: ${{ secrets.SITE_URL || vars.SITE_URL }}
        run: |
          if [ -n "${SITE_URL}" ]; then
            TARGET_URL="${SITE_URL%/}/api/reminders/auto"
            echo "::error::Daily reminder job failed. Check the API logs at ${TARGET_URL}"
          else
            echo "::error::Daily reminder job failed. SITE_URL is not configured in GitHub secrets/variables."
          fi
